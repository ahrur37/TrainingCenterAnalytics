services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: EduRequestSystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: EduRequestSystemAPI/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TestDbString=Host=db;Port=5432;Database=EduRequestSystem;Username=postgres;Password=123

volumes:
  postgres_data: