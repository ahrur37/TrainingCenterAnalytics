name: CI/CD

# CI: сборка проекта и автоматический прогон xUnit-тестов.
# push в master → тесты + деплой; теги v* → релиз Desktop; pull_request в master → тесты.
on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # net8 — API и тесты; net10 — на случай, если в репозиторий попадёт global.json (SDK 10).
          dotnet-version: |
            8.0.x
            10.0.x

      # Сборка тестового проекта по зависимости собирает и сам API.
      - name: Restore dependencies
        run: dotnet restore EduRequestSystemAPI.Tests/EduRequestSystemAPI.Tests.csproj

      - name: Build
        run: dotnet build EduRequestSystemAPI.Tests/EduRequestSystemAPI.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test EduRequestSystemAPI.Tests/EduRequestSystemAPI.Tests.csproj --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-test                  # деплой только после успешной сборки и тестов
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/TrainingCenterAnalytics
            git pull origin master
            docker compose up --build -d

  release-desktop:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Build Cloud version
        run: |
          cp Desktop/appsettings.cloud.json Desktop/appsettings.json
          dotnet publish Desktop/Desktop.csproj -c Release -r osx-arm64 --self-contained -o ./out/cloud
          cp Desktop/appsettings.cloud.json ./out/cloud/appsettings.json
      - name: Build Self-hosted version
        run: |
          cp Desktop/appsettings.selfhosted.json Desktop/appsettings.json
          dotnet publish Desktop/Desktop.csproj -c Release -r osx-arm64 --self-contained -o ./out/selfhosted
          cp Desktop/appsettings.selfhosted.json ./out/selfhosted/appsettings.json
      - name: Rename binaries and archive
        run: |
          mv ./out/cloud/Desktop ./out/cloud/cloud
          mv ./out/selfhosted/Desktop ./out/selfhosted/selfhosted
          cd ./out/cloud && zip -r ../../cloud.zip . && cd ../..
          cd ./out/selfhosted && zip -r ../../selfhosted.zip . && cd ../..
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./cloud.zip
            ./selfhosted.zip
