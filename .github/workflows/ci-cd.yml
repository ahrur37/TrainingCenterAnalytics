name: CI/CD
on: 
  push:
    branches: [ master ]
jobs:
  build: 
    runs-on: ubuntu-latest          # было "ubunti-latest"
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3   # пропущена строка uses
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore EduRequestSystemAPI/EduRequestSystemAPI.csproj
      - name: Build
        run: dotnet build EduRequestSystemAPI/EduRequestSystemAPI.csproj --no-restore
  deploy:
    needs: build
    runs-on: ubuntu-latest           # было "ubuntu/latest"
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to server  
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |                  # нужен | для многострочного значения
            cd ~/TrainingCenterAnalytics
            git pull origin master
            docker compose up --build -d
