name: CI/CD
on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore EduRequestSystemAPI/EduRequestSystemAPI.csproj
      - name: Build
        run: dotnet build EduRequestSystemAPI/EduRequestSystemAPI.csproj --no-restore
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/TrainingCenterAnalytics
            git pull origin master
            docker compose up --build -d
  release-desktop:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Build Cloud version
        run: |
          cp Desktop/appsettings.cloud.json Desktop/appsettings.json
          dotnet publish Desktop/Desktop.csproj -c Release -r osx-arm64 --self-contained -o ./out/cloud
          cp Desktop/appsettings.cloud.json ./out/cloud/appsettings.json
      - name: Build Self-hosted version
        run: |
          cp Desktop/appsettings.selfhosted.json Desktop/appsettings.json
          dotnet publish Desktop/Desktop.csproj -c Release -r osx-arm64 --self-contained -o ./out/selfhosted
          cp Desktop/appsettings.selfhosted.json ./out/selfhosted/appsettings.json
      - name: Rename binaries and archive
        run: |
          mv ./out/cloud/Desktop ./out/cloud/cloud
          mv ./out/selfhosted/Desktop ./out/selfhosted/selfhosted
          cd ./out/cloud && zip -r ../../cloud.zip . && cd ../..
          cd ./out/selfhosted && zip -r ../../selfhosted.zip . && cd ../..
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./cloud.zip
            ./selfhosted.zip
